<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilhabela Roleplay - Painel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    overflow-x: hidden;
}

/* EFEITO NEON */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(0,255,255,0.2), transparent);
    animation: neonMove 6s linear infinite;
}

@keyframes neonMove {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

/* PARTÍCULAS */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.2;
}

.box {
    background: rgba(0,0,0,0.75);
    padding: 25px;
    margin: 50px auto;
    width: 320px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,255,255,0.3);
}

input {
    width: 85%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: cyan;
    border: none;
    padding: 12px;
    width: 90%;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #00bcd4;
}

h1 span:nth-child(1){color:yellow;}
h1 span:nth-child(2){color:cyan;}

.hidden { display: none; }

.card {
    background: rgba(0,0,0,0.7);
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    display: inline-block;
    width: 220px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px cyan;
}

#resultado {
    margin-top: 20px;
    color: yellow;
    white-space: pre-line;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="box" id="login">
    <h1><span>ILHABELA</span> <span>ROLEPLAY</span></h1>
    <p>Login do Jogador</p>
    <input type="text" id="usuario" placeholder="Nome">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" class="hidden">
    <h1><span>ILHABELA</span> <span>ROLEPLAY</span></h1>
    <p>Bem-vindo, <span id="nomePlayer"></span></p>

    <h2> Comprar Coins</h2>

    <div class="card">
        <h3>10 Coins</h3>
        <p>R$ 10</p>
        <button onclick="comprar(10)">Comprar</button>
    </div>

    <div class="card">
        <h3>50 Coins</h3>
        <p>R$ 50</p>
        <button onclick="comprar(50)">Comprar</button>
    </div>

    <div class="card">
        <h3>100 Coins </h3>
        <p>R$ 100</p>
        <button onclick="comprar(100)">Comprar</button>
    </div>

    <div class="card">
        <h3>Custom</h3>
        <input type="number" id="qtd">
        <button onclick="comprarCustom()">Comprar</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
let preco = 1;
let numero = "5512991370534";

function entrar() {
    let user = document.getElementById("usuario").value;

    if(user == "") {
        alert("Digite seu nome!");
        return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
    document.getElementById("nomePlayer").innerText = user;
}

function gerar(qtd) {
    let total = qtd * preco;

    let msg = "*ILHABELA COINS*%0A" +
              "Jogador: " + document.getElementById("nomePlayer").innerText + "%0A" +
              "Quantidade: " + qtd + "%0A" +
              "Valor: R$ " + total;

    document.getElementById("resultado").innerHTML =
        "Pedido criado!<br><br>" +
        `<a href="https://wa.me/${numero}?text=${msg}" target="_blank">
        <button>Enviar no WhatsApp</button></a>`;
}

function comprar(qtd){ gerar(qtd); }

function comprarCustom(){
    let qtd = document.getElementById("qtd").value;
    if(qtd <= 0) return alert("Inválido");
    gerar(qtd);
}
</script>

</body>
</html>
